pre-commit:
  parallel: false
  commands:
    lint:
      glob: '*.{js,jsx,ts,tsx,vue}'
      run: pnpm eslint --fix {staged_files} && git add {staged_files}
    stylelint:
      glob: '*.{css,vue}'
      run: pnpm stylelint --fix {staged_files} --allow-empty-input && git add {staged_files}
    format:
      glob: '*.{js,jsx,ts,tsx,vue,json,css,md}'
      run: pnpm prettier --write {staged_files} && git add {staged_files}
